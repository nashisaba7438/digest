<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGEST</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES ===== */
:root{
  --bg:#080810;--surface:#0e0e1a;--card:#12121f;--border:#1c1c30;--border2:#252538;
  --accent:#00e87a;--accent-dim:rgba(0,232,122,0.10);--red:#ff4060;--blue:#3d8eff;--yellow:#f5c518;
  --text:#e4e4f0;--muted:#52527a;--muted2:#3a3a58;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 10%,rgba(0,232,122,0.03) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 90%,rgba(61,142,255,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;}
.logo{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:0.15em;color:var(--accent);text-shadow:0 0 20px rgba(0,232,122,0.35);flex-shrink:0;user-select:none;}
.header-clock{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);flex-shrink:0;}
.header-slots{display:flex;gap:5px;flex-shrink:0;}
.slot{display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);padding:3px 8px;border:1px solid var(--border);border-radius:20px;transition:all 0.3s;}
.slot.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.slot-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.slot.active .slot-dot{animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.btn-fetch-all{background:var(--accent);color:#000;border:none;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:700;letter-spacing:0.06em;cursor:pointer;border-radius:4px;transition:all 0.2s;white-space:nowrap;}
.btn-fetch-all:hover{background:#fff;box-shadow:0 0 16px rgba(0,232,122,0.4);}
.btn-fetch-all:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none;}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;cursor:pointer;border-radius:4px;transition:all 0.2s;white-space:nowrap;}
.btn-icon:hover{border-color:var(--text);color:var(--text);}

/* ===== TABS ===== */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;scrollbar-width:none;background:var(--surface);position:sticky;top:52px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab-hot{color:var(--accent) !important;}
.tab-hot.active{border-bottom-color:var(--accent);}
.tab-add{font-size:1rem;padding:7px 11px;}
.tab-add:hover{color:var(--accent);}

/* ===== MAIN ===== */
.main{max-width:780px;margin:0 auto;padding:20px 16px;}
.section{display:none;}
.section.active{display:block;}

/* ===== CAT HEADER ===== */
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.cat-icon{font-size:1.3rem;}
.cat-title{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:0.1em;color:var(--text);}
.cat-updated{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);margin-left:auto;}
.btn-add-feed{font-size:0.62rem;padding:4px 10px;border:1px dashed var(--border2);color:var(--muted);background:transparent;cursor:pointer;border-radius:3px;font-family:'JetBrains Mono',monospace;transition:all 0.2s;}
.btn-add-feed:hover{border-color:var(--accent);color:var(--accent);}
.btn-refetch{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;cursor:pointer;border-radius:4px;transition:all 0.2s;font-weight:600;}
.btn-refetch:hover{background:var(--accent);color:#000;}
.btn-refetch:disabled{border-color:var(--border);color:var(--muted);cursor:not-allowed;}

/* ===== ARTICLE CARD ===== */
.article-list{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;gap:0;transition:border-color 0.2s;cursor:pointer;overflow:hidden;}
.card:hover{border-color:var(--border2);}
.card-body{flex:1;padding:14px 16px;min-width:0;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
.card-num{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted2);min-width:18px;}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.tag-game{background:rgba(61,142,255,0.15);color:#3d8eff;border:1px solid rgba(61,142,255,0.25);}
.tag-anime{background:rgba(255,100,150,0.15);color:#ff6496;border:1px solid rgba(255,100,150,0.25);}
.tag-ai{background:rgba(0,232,122,0.12);color:var(--accent);border:1px solid rgba(0,232,122,0.25);}
.tag-geo{background:rgba(255,200,80,0.12);color:#ffc850;border:1px solid rgba(255,200,80,0.25);}
.tag-fin{background:rgba(100,220,160,0.12);color:#64dcA0;border:1px solid rgba(100,220,160,0.25);}
.tag-hot{background:rgba(255,100,60,0.15);color:#ff643c;border:1px solid rgba(255,100,60,0.25);}
.tag-custom{background:rgba(180,120,255,0.12);color:#b478ff;border:1px solid rgba(180,120,255,0.25);}
.card-time{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);}
.imp-dots{display:flex;gap:2px;margin-left:auto;}
.imp-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);}
.imp-dot.on{background:var(--accent);}
.card-title{font-size:0.9rem;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.card-summary{font-size:0.78rem;line-height:1.65;color:var(--muted);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-actions{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 10px;border-left:1px solid var(--border);min-width:46px;justify-content:center;}
.btn-action{background:transparent;border:1px solid var(--border);color:var(--muted);width:32px;height:28px;border-radius:4px;cursor:pointer;font-size:0.75rem;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.btn-action:hover{border-color:var(--text);color:var(--text);}
.btn-action.active-like{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.btn-action.active-dislike{border-color:var(--red);color:var(--red);background:rgba(255,64,96,0.1);}
.btn-action.active-save{border-color:var(--yellow);color:var(--yellow);background:rgba(245,197,24,0.1);}
.btn-src{font-size:0.6rem;padding:0 5px;width:auto;min-width:32px;}

/* ===== LOADING / ERROR ===== */
.loading-state{padding:40px 20px;text-align:center;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);}
.loading-bar-wrap{width:180px;height:2px;background:var(--border);border-radius:2px;margin:0 auto 10px;overflow:hidden;}
.loading-bar{height:100%;background:var(--accent);border-radius:2px;animation:loadbar 1.8s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.error-box{padding:16px 20px;background:rgba(255,64,96,0.08);border:1px solid rgba(255,64,96,0.25);border-radius:6px;color:var(--red);font-size:0.8rem;line-height:1.6;}
.empty-box{padding:40px 20px;text-align:center;color:var(--muted);font-size:0.8rem;}

/* ===== DETAIL PAGE ===== */
#detail-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;}
#detail-page.open{display:block;}
.detail-inner{max-width:720px;margin:0 auto;padding:20px 16px 60px;}
.detail-hero-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;margin-bottom:20px;overflow:hidden;background:var(--card);border:1px solid var(--border);}
.detail-hero{width:100%;height:100%;object-fit:cover;display:block;}
.detail-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.detail-tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;margin-bottom:10px;}
.detail-title{font-size:1.3rem;font-weight:700;line-height:1.5;margin-bottom:20px;color:var(--text);}
.detail-section{margin-bottom:18px;}
.detail-section-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.detail-section-text{font-size:0.85rem;line-height:1.75;color:var(--text);}
.detail-footer{display:flex;align-items:center;gap:8px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
.btn-source{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.btn-source:hover{border-color:var(--accent);color:var(--accent);}
.detail-footer-actions{display:flex;gap:6px;margin-left:auto;}
.detail-back{display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.68rem;cursor:pointer;padding:6px 0;margin-bottom:16px;transition:color 0.2s;}
.detail-back:hover{color:var(--text);}

/* ===== AI CHAT ===== */
.chat-wrap{margin-top:32px;border-top:1px solid var(--border);padding-top:24px;}
.chat-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}
.chat-messages{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:360px;overflow-y:auto;}
.chat-msg{padding:10px 14px;border-radius:6px;font-size:0.82rem;line-height:1.65;}
.chat-msg.user{background:var(--accent-dim);border:1px solid rgba(0,232,122,0.2);align-self:flex-end;max-width:85%;}
.chat-msg.ai{background:var(--card);border:1px solid var(--border);align-self:flex-start;max-width:85%;}
.chat-input-wrap{display:flex;gap:7px;}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s;resize:none;}
.chat-input:focus{border-color:var(--accent);}
.btn-chat-send{background:var(--accent);color:#000;border:none;padding:9px 16px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-chat-send:hover{background:#fff;}
.btn-chat-send:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* ===== SETTINGS MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:0.1em;color:var(--text);}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px;transition:color 0.2s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px;}
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.modal-tab{padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;}
.modal-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.modal-section{display:none;}
.modal-section.active{display:block;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.78rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
.form-hint{font-size:0.72rem;color:var(--muted);margin-top:6px;line-height:1.6;}
.form-hint a{color:var(--accent);text-decoration:none;}
.form-hint a:hover{text-decoration:underline;}
.btn-primary{background:var(--accent);color:#000;border:none;padding:8px 18px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;cursor:pointer;border-radius:4px;transition:all 0.2s;width:100%;}
.btn-primary:hover{background:#fff;}
.billing-steps{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;}
.billing-step{display:flex;gap:10px;margin-bottom:10px;font-size:0.78rem;line-height:1.6;color:var(--text);}
.billing-step:last-child{margin-bottom:0;}
.billing-step-num{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--accent);font-weight:700;flex-shrink:0;margin-top:2px;}

/* ===== CAT MODAL ===== */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;}
.cat-item-icon{font-size:1rem;}
.cat-item-label{font-size:0.82rem;font-weight:500;flex:1;}
.cat-item-type{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);padding:2px 6px;border:1px solid var(--border);border-radius:3px;}
.btn-cat-del{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;font-size:0.65rem;cursor:pointer;border-radius:3px;transition:all 0.2s;font-family:'JetBrains Mono',monospace;}
.btn-cat-del:hover{border-color:var(--red);color:var(--red);}
.divider{height:1px;background:var(--border);margin:16px 0;}

/* ===== BOOKMARK TAB ===== */
.bookmark-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:0.82rem;}
.pin-section-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;z-index:400;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .header{padding:0 12px;gap:8px;}
  .header-slots{display:none;}
  .main{padding:14px 10px;}
  .card-summary{-webkit-line-clamp:2;}
  .detail-title{font-size:1.1rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">DIGEST</div>
  <div class="header-clock" id="clock">--:--:--</div>
  <div class="header-slots" id="slots"></div>
  <div class="header-right">
    <button class="btn-fetch-all" id="btnFetchAll" onclick="fetchAll()">⚡ 全取得</button>
    <button class="btn-icon" onclick="openCatModal()">📂 カテゴリ</button>
    <button class="btn-icon" onclick="openSettings()">⚙ 設定</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- MAIN -->
<div class="main" id="main"></div>

<script>
// ===== CONSTANTS =====
const SCHEDULE = ['06:00','12:00','16:00'];
const ONE_MONTH = 30*24*60*60*1000;
const CACHE_TTL = 3*60*60*1000; // 3時間
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
];

const DEFAULT_CATS = {
  hot:          {label:'ホットニュース', icon:'🔥', tagClass:'tag-hot',   useSearch:true, searchQuery:'今日 日本 話題 トレンドニュース', isHot:true, fixed:true},
  game_4gamer:  {label:'ゲーム 4Gamer',  icon:'🎮', tagClass:'tag-game',  feeds:['https://www.4gamer.net/rss/index.xml'], fixed:true},
  game_gamewatch:{label:'ゲーム GameWatch',icon:'🕹',tagClass:'tag-game', feeds:['https://game.watch.impress.co.jp/data/rss/1.0/gmw/feed.rdf'], fixed:true},
  anime:        {label:'アニメ',          icon:'📺', tagClass:'tag-anime', useSearch:true, searchQuery:'最新アニメ 新番組 OR 声優 OR アニメ化', fixed:true},
  ai:           {label:'AI最新情報',      icon:'🤖', tagClass:'tag-ai',    useSearch:true, searchQuery:'生成AI OR LLM OR ChatGPT 最新ニュース', fixed:true},
  geopolitics:  {label:'地政学',          icon:'🌍', tagClass:'tag-geo',   useSearch:true, searchQuery:'地政学 OR 国際情勢 OR 外交 最新', fixed:true},
  finance:      {label:'金融情報',        icon:'💹', tagClass:'tag-fin',   useSearch:true, searchQuery:'日本株 OR 為替相場 OR 日経平均 OR FRB OR 金融市場 最新動向', fixed:true},
};

// ===== STATE =====
var CATS = {};
var cache = {};
var prefs = {likes:{}, dislikes:{}, bookmarks:[]};
var seen = []; // 既読タイトルリスト
var currentCat = 'hot';
var detailState = null; // {catId, idx, chatHistory}
var lastAutoFetch = {};

// ===== STORAGE =====
function getKey(){ return localStorage.getItem('digest_key') || ''; }
function setKey(k){ localStorage.setItem('digest_key', k); }

function loadAll(){
  try{ var c=localStorage.getItem('digest_cache'); if(c) cache=JSON.parse(c); }catch(e){}
  try{ var p=localStorage.getItem('digest_prefs'); if(p) prefs=JSON.parse(p); }catch(e){}
  try{ var s=localStorage.getItem('digest_seen');  if(s) seen=JSON.parse(s); }catch(e){}
  loadCats();
}

function saveCache(){
  var now = Date.now();
  Object.keys(cache).forEach(function(id){
    if(cache[id] && cache[id].updatedAt && now - new Date(cache[id].updatedAt).getTime() > 7*24*60*60*1000){
      delete cache[id];
    }
  });
  try{ localStorage.setItem('digest_cache', JSON.stringify(cache)); }
  catch(e){
    if(e.name==='QuotaExceededError'){
      Object.keys(cache).forEach(function(id){
        if(cache[id] && cache[id].articles) cache[id].articles.forEach(function(a){ delete a.detail; });
      });
      try{ localStorage.setItem('digest_cache', JSON.stringify(cache)); }catch(e2){}
    }
  }
}

function savePrefs(){ try{ localStorage.setItem('digest_prefs', JSON.stringify(prefs)); }catch(e){} }

function saveSeen(){
  if(seen.length > 500) seen = seen.slice(seen.length - 500);
  try{ localStorage.setItem('digest_seen', JSON.stringify(seen)); }catch(e){}
}

function saveCats(){
  var toSave = {};
  Object.keys(CATS).forEach(function(id){
    if(!DEFAULT_CATS[id]){
      // 完全にカスタムのカテゴリはそのまま保存
      toSave[id] = CATS[id];
    } else {
      // デフォルトカテゴリはfeedsの変更だけ保存
      var def = DEFAULT_CATS[id];
      var cur = CATS[id];
      var feedsChanged = JSON.stringify(cur.feeds||[]) !== JSON.stringify(def.feeds||[]);
      if(feedsChanged){
        toSave[id] = {feeds: cur.feeds||[]};
      }
    }
  });
  try{ localStorage.setItem('digest_cats', JSON.stringify(toSave)); }catch(e){}
}

function loadCats(){
  try{
    var saved = JSON.parse(localStorage.getItem('digest_cats')||'{}');
    CATS = {};
    // デフォルトカテゴリをベースにする
    Object.keys(DEFAULT_CATS).forEach(function(id){
      CATS[id] = Object.assign({}, DEFAULT_CATS[id]);
      // 保存されたfeedsがあれば上書き
      if(saved[id] && saved[id].feeds !== undefined){
        CATS[id].feeds = saved[id].feeds;
      }
    });
    // カスタムカテゴリを追加
    Object.keys(saved).forEach(function(id){
      if(!DEFAULT_CATS[id]) CATS[id] = saved[id];
    });
  }catch(e){
    CATS = Object.assign({}, DEFAULT_CATS);
  }
}

function isCacheFresh(catId){
  return cache[catId] && cache[catId].updatedAt &&
    Date.now() - new Date(cache[catId].updatedAt).getTime() < CACHE_TTL;
}

// ===== SEEN / DEDUP =====
function addSeen(titles){
  titles.forEach(function(t){ if(t && !seen.includes(t)) seen.push(t); });
  saveSeen();
}

function isSeenTitle(title){
  var t = (title||'').trim();
  var p = t.slice(0,20);
  return seen.some(function(s){ return s === t || (p.length >= 10 && s.slice(0,20) === p); });
}

// タイトルが似ているか（先頭15文字一致）
function isSimilarTitle(a, b){
  var pa = (a||'').trim().slice(0,15);
  var pb = (b||'').trim().slice(0,15);
  return pa && pb && pa === pb;
}

// ===== PREFS PROMPT =====
function getPrefsPrompt(){
  var likes = Object.keys(prefs.likes||{}).filter(function(k){ return (prefs.likes[k]||0)>=1; }).slice(0,8);
  var dislikes = Object.keys(prefs.dislikes||{}).filter(function(k){ return (prefs.dislikes[k]||0)>=1; }).slice(0,5);
  var str = '';
  if(likes.length) str += '\n好きなジャンル・トピック: ' + likes.join(', ');
  if(dislikes.length) str += '\n苦手なジャンル・トピック: ' + dislikes.join(', ');
  return str;
}

function addPref(type, title, tag){
  var keys = [tag, ...(title||'').split(/[\s　、。・]+/).filter(function(w){ return w.length>=2; }).slice(0,3)];
  var obj = type==='like' ? prefs.likes : prefs.dislikes;
  keys.forEach(function(k){ if(k) obj[k] = (obj[k]||0)+1; });
  savePrefs();
}

// ===== RSS PROXY =====
async function fetchWithProxy(url){
  for(var i=0; i<PROXIES.length; i++){
    try{
      var res = await fetch(PROXIES[i](url), {signal: AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      var text = await res.text();
      if(!text || text.length < 100) continue;
      if(text.trim().startsWith('{"contents"')){
        try{ var j=JSON.parse(text); if(j.contents && j.contents.length>100) return j.contents; }catch(e){}
        continue;
      }
      return text;
    }catch(e){ continue; }
  }
  throw new Error('取得失敗');
}

async function fetchRSS(url){
  var text = await fetchWithProxy(url);
  if(!text || text.trim().indexOf('<')!==0 || (text.indexOf('<channel')===-1 && text.indexOf('<feed')===-1)) return [];
  var items=[], cutoff=Date.now()-ONE_MONTH;
  var re=/<item[\s>]([\s\S]*?)<\/item>/gi, m;
  while((m=re.exec(text))!==null){
    var b=m[1];
    var title=(b.match(/<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/)||[])[1]||'';
    var link=(b.match(/<link[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/link>/)||[])[1]||'';
    if(!link){var al=b.match(/<link[^>]+href=["'](https?:\/\/[^"'#][^"']+)["']/i); if(al) link=al[1];}
    link=link.replace(/[\t\r\n ]+/g,'').trim();
    if(link&&/^https?:\/\/[^\/]+\/?$/.test(link)) link='';
    var desc=(b.match(/<description[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/description>/)||[])[1]||'';
    var pub=(b.match(/<pubDate[^>]*>([\s\S]*?)<\/pubDate>/)||[])[1]||'';
    if(pub){var d=new Date(pub); if(!isNaN(d)&&d.getTime()<cutoff) continue;}
    var urlMatch=desc.match(/href="(https?:\/\/(?!news\.google\.com)[^"]+)"/);
    var finalLink=(urlMatch&&urlMatch[1])||link.trim();
    var img='';
    var imgM=b.match(/<media:(?:content|thumbnail)[^>]+url="([^"]+)"/i); if(imgM) img=imgM[1];
    if(!img){var encM=b.match(/<enclosure[^>]+url="([^"]+\.(?:jpg|jpeg|png|webp|gif))"[^>]*type="image/i); if(encM) img=encM[1];}
    if(!img){var encM2=b.match(/<enclosure[^>]+type="image[^"]*"[^>]+url="([^"]+)"/i); if(encM2) img=encM2[1];}
    if(!img){var iTag=desc.match(/<img[^>]+src="(https?:\/\/[^"]+\.(?:jpg|jpeg|png|webp|gif)[^"]*)"/i); if(iTag) img=iTag[1];}
    if(title.trim()) items.push({
      title:title.trim().replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'"),
      link:finalLink, image:img
    });
  }
  if(!items.length){
    var re2=/<entry[\s>]([\s\S]*?)<\/entry>/gi;
    while((m=re2.exec(text))!==null){
      var b=m[1];
      var title=(b.match(/<title[^>]*>([\s\S]*?)<\/title>/)||[])[1]||'';
      var al=b.match(/<link[^>]+href=["'](https?:\/\/[^"']+)["']/i);
      if(title.trim()) items.push({title:title.trim(),link:al?al[1]:'',image:''});
    }
  }
  return items.slice(0,20);
}

// ===== GEMINI API =====
async function gemini(prompt, maxTokens){
  var url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key='+getKey();
  var body={contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:maxTokens||2000}};
  var res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(40000),body:JSON.stringify(body)});
  if(!res.ok){var e=await res.json(); throw new Error('Gemini error: '+((e.error&&e.error.message)||res.status));}
  var j=await res.json();
  var parts=j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts;
  if(!parts) throw new Error('Geminiレスポンスなし');
  return parts.map(function(p){return p.text||'';}).join('');
}

// ===== SITE SEARCH (site:URL検索でRSSなしサイトに対応) =====
async function fetchBySiteSearch(siteUrl){
  var apiUrl='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key='+getKey();
  var today=new Date().toLocaleDateString('ja-JP');
  var prompt=today+'時点の '+siteUrl+' の最新記事を10件、JSONのみで返せ。[から]で終わること。URLは必ず'+siteUrl+'ドメインの実在するURLにすること。'+
    '[{"title":"記事タイトル","link":"https://実在するURL","image":""}]';
  var body={
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{maxOutputTokens:3000},
    tools:[{googleSearch:{}}]
  };
  var res=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(40000),body:JSON.stringify(body)});
  if(!res.ok){var e=await res.json(); throw new Error('Gemini error: '+((e.error&&e.error.message)||res.status));}
  var j=await res.json();
  var parts=j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts;
  var raw=(parts||[]).map(function(p){return p.text||'';}).join('');
  // groundingMetadataからURLを取得
  var meta=j.candidates&&j.candidates[0]&&j.candidates[0].groundingMetadata;
  var chunks=(meta&&meta.groundingChunks)||[];
  var sourceUrls=chunks.map(function(ch){return ch.web&&ch.web.uri||'';})
    .filter(function(u){return u && u.includes(new URL(siteUrl).hostname);});
  var s=raw.indexOf('['),e=raw.lastIndexOf(']');
  if(s===-1||e===-1) return sourceUrls.map(function(u){return {title:u,link:u,image:''};}).slice(0,10);
  try{
    var arts=parseJson(raw.slice(s,e+1));
    return arts.map(function(a,i){
      var link=a.link||'';
      // example.comや別ドメインはgroundingURLで置き換え
      if(!link||link.includes('example.com')||!link.includes(new URL(siteUrl).hostname)){
        link=sourceUrls[i]||sourceUrls[0]||'';
      }
      return {title:a.title||'',link:link,image:a.image||''};
    }).filter(function(a){return a.title;});
  }catch(e){ return sourceUrls.map(function(u){return {title:u,link:u,image:''};}).slice(0,10); }
}

// RSS → Google News RSS → 失敗 の順でフォールバック
var siteRssCache = {}; // {url: 'rss_url' or 'failed'}

function toGoogleNewsRss(siteUrl){
  try{
    var hostname = new URL(siteUrl).hostname;
    return 'https://news.google.com/rss/search?q=site:' + hostname + '&hl=ja&gl=JP&ceid=JP:ja';
  }catch(e){ return null; }
}

async function fetchSite(siteUrl){
  // キャッシュ済みで失敗確定
  if(siteRssCache[siteUrl] === 'failed'){
    return {items:[], method:'failed', url:siteUrl};
  }
  // キャッシュ済みのRSS URL
  if(siteRssCache[siteUrl] && siteRssCache[siteUrl] !== 'failed'){
    try{
      var items=await fetchRSS(siteRssCache[siteUrl]);
      if(items.length>0) return {items:items, method:'rss'};
    }catch(e){}
    siteRssCache[siteUrl]='failed';
    return {items:[], method:'failed', url:siteUrl};
  }

  // URLがrss/feed/xmlっぽければそのまま試す
  if(/rss|feed|atom|xml/i.test(siteUrl)){
    try{
      var items=await fetchRSS(siteUrl);
      if(items.length>0){ siteRssCache[siteUrl]=siteUrl; return {items:items, method:'rss'}; }
    }catch(e){}
    // RSS URL指定なのに取れない → 失敗
    siteRssCache[siteUrl]='failed';
    return {items:[], method:'failed', url:siteUrl};
  }

  // 一般サイト：/feed/ と /rss.xml を試す
  var candidates=[
    siteUrl.replace(/\/?$/,'/feed/'),
    siteUrl.replace(/\/?$/,'/rss.xml'),
  ];
  for(var i=0;i<candidates.length;i++){
    try{
      var items=await fetchRSS(candidates[i]);
      if(items.length>0){ siteRssCache[siteUrl]=candidates[i]; return {items:items, method:'rss'}; }
    }catch(e){}
  }

  // RSS失敗 → Google News RSSを試す
  var gnUrl = toGoogleNewsRss(siteUrl);
  if(gnUrl){
    try{
      var items=await fetchRSS(gnUrl);
      if(items.length>0){ siteRssCache[siteUrl]=gnUrl; return {items:items, method:'googlenews'}; }
    }catch(e){}
  }

  // 全部失敗
  siteRssCache[siteUrl]='failed';
  return {items:[], method:'failed', url:siteUrl};
}

// ===== FETCH ONE CATEGORY =====
async function fetchOne(catId, forceRefresh){
  if(!getKey()){ openSettings(); return; }
  var cat=CATS[catId]; if(!cat) return;
  if(!forceRefresh && isCacheFresh(catId)){
    renderArticles(catId, cache[catId].articles);
    return;
  }
  var btn=document.getElementById('btn-'+catId);
  var box=document.getElementById('art-'+catId);
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:14px;height:14px;margin:0;display:inline-block;vertical-align:middle;margin-right:6px"></div>取得中'; }
  if(box) box.innerHTML='<div class="loading-state"><div class="loading-bar-wrap"><div class="loading-bar"></div></div><div class="loading-text">取得中...</div></div>';
  try{
    var result;

    if(cat.isHot){
      // ホットニュースだけGoogle Search grounding
      result = await fetchHotNews();
    } else if(!cat.feeds || !cat.feeds.length){
      throw new Error('サイトが登録されていません。カテゴリ設定からサイトを追加してください。');
    } else {
      // 各サイトから記事を取得（RSSあり→RSS、なし→site:検索）
      var allItems=[];
      var fetchResults=await Promise.all(cat.feeds.map(function(f){
        return fetchSite(f).catch(function(){ return {items:[],method:'failed'}; });
      }));
      // インターリーブ（各サイトから均等に）
      var maxLen=Math.max.apply(null,fetchResults.map(function(r){return r.items.length;}));
      for(var fi=0;fi<maxLen;fi++){
        fetchResults.forEach(function(res){ if(res.items[fi]) allItems.push(res.items[fi]); });
      }
      // 取得できなかったサイトを報告
      var failedSites = fetchResults.filter(function(r){return r.method==='failed';}).map(function(r){return r.url;});
      if(!allItems.length){
        var msg = '記事が見つかりませんでした';
        if(failedSites.length) msg += '\n以下のサイトはRSSに対応していないため取得できませんでした:\n' + failedSites.join('\n');
        throw new Error(msg);
      }

      // タイトル重複除去
      var seenT=[];
      var items=allItems.filter(function(it){
        var t=(it.title||'').trim(); var p=t.slice(0,20);
        if(seenT.some(function(s){return s===t||s.slice(0,20)===p;})) return false;
        seenT.push(t); return true;
      });

      // カテゴリ間重複除去（先頭15文字一致）
      var allCachedTitles=[];
      Object.keys(cache).forEach(function(id){
        if(id!==catId && cache[id] && cache[id].articles)
          cache[id].articles.forEach(function(a){allCachedTitles.push(a.title);});
      });
      items=items.filter(function(it){
        return !allCachedTitles.some(function(t){return isSimilarTitle(it.title,t);});
      });

      if(!items.length) throw new Error('他カテゴリと重複する記事のみでした');

      // 👍した記事を除外
      var likedTitles=Object.keys(prefs.likes||{});
      items=items.filter(function(it){
        return !likedTitles.some(function(lt){ return lt===it.title||(lt.length>10&&it.title.indexOf(lt.slice(0,15))!==-1); });
      });

      // AI要約（8件）
      var headlines=items.slice(0,20).map(function(it,i){return '['+i+'] '+it.title;}).join('\n');
      var prefStr=getPrefsPrompt();
      var prompt='「'+cat.label+'」ヘッドライン:\n'+headlines+'\n\n重要8件をJSONのみで返せ。[から]で終わること。titleは必ずヘッドラインのテキストをそのままコピーすること。'+prefStr+'\n[{"title":"ヘッドラインのタイトルをそのままコピー","summary":"100〜200字で内容を具体的に","importance":3}]';
      var raw=await gemini(prompt,5000);
      var sv=raw.indexOf('['),ev=raw.lastIndexOf(']');
      if(sv===-1||ev===-1) throw new Error('JSONパース失敗: '+raw.slice(0,80));
      var arts=parseJson(raw.slice(sv,ev+1));
      result=arts.map(function(a){
        var atitle=(a.title||'').trim(); var matched=null;
        for(var i=0;i<items.length;i++) if(items[i].title.trim()===atitle){matched=items[i];break;}
        if(!matched) for(var i=0;i<items.length;i++){var it=items[i].title.trim(); if(it.indexOf(atitle)!==-1||atitle.indexOf(it)!==-1){matched=items[i];break;}}
        if(!matched){var p10=atitle.slice(0,10); for(var i=0;i<items.length;i++) if(items[i].title.indexOf(p10)!==-1){matched=items[i];break;}}
        return {title:a.title, summary:a.summary, tag:cat.label, importance:a.importance||3, link:matched?matched.link:'', image:matched?matched.image||'':''};
      }).filter(function(a){return a.title;});
    }

    if(!result||!result.length) throw new Error('記事が見つかりませんでした');
    cache[catId]={articles:result, updatedAt:new Date().toISOString()};
    saveCache();
    renderArticles(catId, result);
    var upd=document.getElementById('upd-'+catId);
    if(upd) upd.textContent='更新: '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  }catch(err){
    if(box) box.innerHTML='<div class="error-box">⚠️ '+escHtml(err.message)+'</div>';
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='再取得';}
  }
}

// ===== HOT NEWS =====
async function fetchHotNews(){
  var today=new Date().toLocaleDateString('ja-JP');
  var prefStr=getPrefsPrompt();
  var seenStr=seen.slice(-30).map(function(s){return s.slice(0,20);}).join('、').slice(0,200);
  var prompt='以下の条件でJSONのみ返せ。前後の文章一切不要。[から]で終わること。'+
    '条件:'+today+'の日本で話題のニュース8件。重複なし。'+prefStr+
    (seenStr?'除外:'+seenStr:'')+
    '[{"title":"タイトル","summary":"100〜200字の概要","importance":3}]';
  var apiUrl='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key='+getKey();
  var body={contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:4000},tools:[{googleSearch:{}}]};
  var res=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(40000),body:JSON.stringify(body)});
  if(!res.ok){var e=await res.json(); throw new Error('Gemini error: '+((e.error&&e.error.message)||res.status));}
  var j=await res.json();
  var parts=j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts;
  var raw=(parts||[]).map(function(p){return p.text||'';}).join('');
  var meta=j.candidates&&j.candidates[0]&&j.candidates[0].groundingMetadata;
  var chunks=(meta&&meta.groundingChunks)||[];
  var sourceUrls=chunks.map(function(ch){return ch.web&&ch.web.uri||'';}).filter(Boolean);
  var supports=(meta&&meta.groundingSupports)||[];
  var s=raw.indexOf('['),e=raw.lastIndexOf(']');
  if(s===-1||e===-1) throw new Error('JSONパース失敗');
  var arts=parseJson(raw.slice(s,e+1));
  var seenT=[];
  arts=arts.filter(function(a){
    if(!a.title) return false;
    var p=a.title.slice(0,20);
    if(seenT.some(function(x){return x===p;})) return false;
    seenT.push(p); return true;
  });
  var result=arts.map(function(a,i){
    var link='';
    if(supports[i]&&supports[i].groundingChunkIndices&&supports[i].groundingChunkIndices.length){
      link=sourceUrls[supports[i].groundingChunkIndices[0]]||'';
    }
    if(!link||link.includes('example.com')) link=sourceUrls[i]||sourceUrls[0]||'';
    return {title:a.title||'',summary:a.summary||'',tag:'ホットニュース',importance:a.importance||3,link:link,image:''};
  });
  addSeen(result.map(function(a){return a.title;}));
  return result;
}

// ===== OGP / FALLBACK IMAGE =====
async function fetchOgpImage(url){
  if(!url) return null;
  try{
    var r=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});
    var j=await r.json();
    return j.data && j.data.image && j.data.image.url || null;
  }catch(e){ return null; }
}

// ===== RENDER ARTICLES =====
function renderArticles(catId, articles){
  var box=document.getElementById('art-'+catId); if(!box) return;
  if(!articles||!articles.length){ box.innerHTML='<div class="empty-box">記事がありません</div>'; return; }
  var cat=CATS[catId]||{};
  var html='<div class="article-list">';
  articles.forEach(function(a,i){
    var saved=isSaved(a.title);
    var liked=isLiked(a.title); var disliked=isDisliked(a.title);
    var dots='';
    for(var d=1;d<=5;d++) dots+='<div class="imp-dot'+(d<=(a.importance||3)?' on':'')+'"></div>';
    html+=
      '<div class="card" onclick="openDetail(\''+escAttr(catId)+'\','+i+')">'+
      '<div class="card-body">'+
      '<div class="card-meta">'+
      '<span class="card-num">'+(i+1).toString().padStart(2,'0')+'</span>'+
      '<span class="tag '+(a.tagClass||cat.tagClass||'tag-custom')+'">'+escHtml(a.tag||cat.label)+'</span>'+
      '<span class="card-time" id="ctime-'+catId+'-'+i+'"></span>'+
      '<div class="imp-dots">'+dots+'</div>'+
      '</div>'+
      '<div class="card-title">'+escHtml(a.title)+'</div>'+
      '<div class="card-summary">'+escHtml(a.summary||'')+'</div>'+
      '</div>'+
      '<div class="card-actions" onclick="event.stopPropagation()">'+
      (a.link?'<a class="btn-action btn-src" href="'+escAttr(a.link)+'" target="_blank" rel="noopener" title="元記事">↗</a>':'<span style="height:28px"></span>')+
      '<button class="btn-action'+(liked?' active-like':'')+'" title="いいね" onclick="react(\''+escAttr(catId)+'\','+i+',\'like\')">👍</button>'+
      '<button class="btn-action'+(disliked?' active-dislike':'')+'" title="バッド" onclick="react(\''+escAttr(catId)+'\','+i+',\'dislike\')">👎</button>'+
      '<button class="btn-action'+(saved?' active-save':'')+'" title="保存" onclick="react(\''+escAttr(catId)+'\','+i+',\'save\')">🔖</button>'+
      '</div>'+
      '</div>';
  });
  html+='</div>';
  box.innerHTML=html;

    articles.forEach(function(_,i){
      var el=document.getElementById('ctime-'+catId+'-'+i); if(el) el.textContent=t;
    });

// ===== REACTION =====
function isSaved(title){ return (prefs.bookmarks||[]).some(function(b){return b.title===title;}); }
function isLiked(title){ return (prefs.likes||{})[title] > 0; }
function isDisliked(title){ return (prefs.dislikes||{})[title] > 0; }

function react(catId, idx, type){
  var arts=cache[catId]&&cache[catId].articles; if(!arts) return;
  var a=arts[idx]; if(!a) return;
  if(type==='like'){
    addPref('like',a.title,a.tag);
    addSeen([a.title]); // 👍した記事は既読扱いで次回除外
    showToast('👍 いいね！');
  } else if(type==='dislike'){
    addPref('dislike',a.title,a.tag);
    addSeen([a.title]); // 👎した記事も次回除外
    showToast('👎 バッド');
  } else if(type==='save'){
    toggleSave(a);
    renderArticles(catId,arts);
    if(currentCat==='bookmarks') renderBookmarks();
    return;
  }
  renderArticles(catId,arts);
}

function toggleSave(article){
  var bm=prefs.bookmarks||[];
  var idx=bm.findIndex(function(b){return b.title===article.title;});
  if(idx>=0){
    bm.splice(idx,1);
    showToast('🔖 保存を解除しました');
  } else {
    if(bm.length>=100) bm.shift();
    bm.unshift({title:article.title,summary:article.summary,link:article.link,image:article.image,tag:article.tag,tagClass:article.tagClass,pinned:false,savedAt:new Date().toISOString()});
    showToast('🔖 保存しました');
  }
  prefs.bookmarks=bm; savePrefs();
}

// ===== DETAIL PAGE =====
function openDetail(catId, idx){
  var cat=CATS[catId]; if(!cat) return;
  var arts=cache[catId]&&cache[catId].articles; if(!arts) return;
  var a=arts[idx]; if(!a) return;
  detailState={catId:catId, idx:idx, chatHistory:[]};
  history.pushState({detail:true,catId:catId,idx:idx},'','#detail');

  // タグ・タイトル
  document.getElementById('detail-tag').className='detail-tag '+(a.tagClass||cat.tagClass||'tag-custom');
  document.getElementById('detail-tag').textContent=a.tag||cat.label;
  document.getElementById('detail-title').textContent=a.title;

  // アイキャッチ
  var hw=document.getElementById('detail-hero-wrap');
  hw.style.display='block';
  hw.innerHTML='';
  var placeholder=makePlaceholderSvg(cat);
  var img=document.createElement('img');
  img.className='detail-hero';
  img.alt=a.title;
  img.src=a.image||placeholder;
  img.onerror=function(){img.src=placeholder;};
  hw.appendChild(img);
  // OGP取得（画像がない場合）
  if(!a.image && a.link){
    fetchOgpImage(a.link).then(function(ogp){
      if(ogp){
        img.src=ogp;
        arts[idx].image=ogp;
        saveCache();
      }
    });
  }

  // 詳細本文（キャッシュあればそのまま、なければAI生成）
  var bodyEl=document.getElementById('detail-body');
  bodyEl.innerHTML='<div class="loading-state"><div class="spinner"></div><div class="loading-text">AI要約を生成中...</div></div>';
  if(a.detail){
    renderDetailBody(a.detail);
  } else {
    generateDetail(catId,idx,a);
  }

  // フッター
  var footer=document.getElementById('detail-footer');
  var srcBtn=document.getElementById('detail-src-btn');
  if(a.link){ srcBtn.href=a.link; footer.style.display='flex'; }
  else footer.style.display='none';
  updateDetailBtns(a);

  // チャットリセット
  document.getElementById('chat-messages').innerHTML='';
  document.getElementById('chat-input').value='';

  document.getElementById('detail-page').classList.add('open');
  document.getElementById('detail-page').scrollTop=0;
}

async function generateDetail(catId,idx,article){
  var cat=CATS[catId]||{};
  try{
    var prompt='以下の記事について詳しく解説してください。JSONのみで返してください。\nタイトル: '+article.title+'\n概要: '+article.summary+'\n\n{"content":"記事の詳細な内容（200字以上）","audience":"誰向けの情報か","analysis":"背景・意義・注目点（150字以上）"}';
    var raw=await gemini(prompt,3000);
    var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1) throw new Error('parse fail');
    var detail=parseJson(raw.slice(s,e+1));
    if(cache[catId]&&cache[catId].articles&&cache[catId].articles[idx]){
      cache[catId].articles[idx].detail=detail;
      saveCache();
    }
    if(detailState&&detailState.catId===catId&&detailState.idx===idx) renderDetailBody(detail);
  }catch(e){
    var bodyEl=document.getElementById('detail-body');
    if(bodyEl) bodyEl.innerHTML='<div class="detail-section"><div class="detail-section-text">'+escHtml(article.summary)+'</div></div>';
  }
}

function renderDetailBody(detail){
  var bodyEl=document.getElementById('detail-body'); if(!bodyEl) return;
  bodyEl.innerHTML=
    '<div class="detail-section"><div class="detail-section-label">内容</div><div class="detail-section-text">'+escHtml(detail.content||'')+'</div></div>'+
    (detail.audience?'<div class="detail-section"><div class="detail-section-label">対象</div><div class="detail-section-text">'+escHtml(detail.audience)+'</div></div>':'')+
    (detail.analysis?'<div class="detail-section"><div class="detail-section-label">解説</div><div class="detail-section-text">'+escHtml(detail.analysis)+'</div></div>':'');
}

function updateDetailBtns(a){
  var lb=document.getElementById('detail-btn-like');
  var db=document.getElementById('detail-btn-dislike');
  var sb=document.getElementById('detail-btn-save');
  if(lb) lb.className='btn-action'+(isLiked(a.title)?' active-like':'');
  if(db) db.className='btn-action'+(isDisliked(a.title)?' active-dislike':'');
  if(sb) sb.className='btn-action'+(isSaved(a.title)?' active-save':'');
}

function detailReact(type){
  if(!detailState) return;
  var arts=cache[detailState.catId]&&cache[detailState.catId].articles; if(!arts) return;
  var a=arts[detailState.idx]; if(!a) return;
  react(detailState.catId,detailState.idx,type);
  updateDetailBtns(a);
  if(currentCat===detailState.catId) renderArticles(detailState.catId,arts);
}

function closeDetail(){
  document.getElementById('detail-page').classList.remove('open');
  if(location.hash==='#detail') history.back();
}

window.addEventListener('popstate',function(e){
  if(!e.state||!e.state.detail) document.getElementById('detail-page').classList.remove('open');
});

// ===== AI CHAT =====
async function sendChat(){
  if(!detailState) return;
  var input=document.getElementById('chat-input');
  var msg=input.value.trim(); if(!msg) return;
  var sendBtn=document.getElementById('chat-send-btn');
  input.value=''; sendBtn.disabled=true;
  var msgs=document.getElementById('chat-messages');

  var arts=cache[detailState.catId]&&cache[detailState.catId].articles;
  var a=arts&&arts[detailState.idx];

  appendChatMsg('user',msg);
  detailState.chatHistory.push({role:'user',content:msg});

  var sysCtx='あなたは記事について解説するAIアシスタントです。\n記事タイトル: '+(a?a.title:'')+'\n記事概要: '+(a?a.summary:'');
  var histStr=detailState.chatHistory.slice(-6).map(function(h){return h.role+':\n'+h.content;}).join('\n\n');
  var prompt=sysCtx+'\n\n---\n'+histStr;
  try{
    var reply=await gemini(prompt,2000);
    appendChatMsg('ai',reply);
    detailState.chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    appendChatMsg('ai','エラーが発生しました: '+e.message);
  }
  sendBtn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function appendChatMsg(role,text){
  var msgs=document.getElementById('chat-messages');
  var div=document.createElement('div');
  div.className='chat-msg '+role;
  div.textContent=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}

function tabClick(id){

function switchTab(id){
  currentCat=id;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });

// ===== BOOKMARKS =====
function renderBookmarks(){
  var box=document.getElementById('art-bookmarks'); if(!box) return;
  var bm=prefs.bookmarks||[];
  if(!bm.length){ box.innerHTML='<div class="bookmark-empty">保存した記事がありません</div>'; return; }
  var pinned=bm.filter(function(b){return b.pinned;});
  var normal=bm.filter(function(b){return !b.pinned;});
  var html='';
  if(pinned.length){
    html+='<div class="pin-section-label">📌 ピン留め</div>';
    html+=renderBookmarkCards(pinned,true);

  if(normal.length){
    if(pinned.length) html+='<div class="pin-section-label" style="margin-top:16px">保存済み</div>';
    html+=renderBookmarkCards(normal,false);
  }
  box.innerHTML=html;
}

function renderBookmarkCards(list, pinned){
  var html='<div class="article-list">';
  list.forEach(function(a,i){
    html+=
      '<div class="card">'+
      '<div class="card-body">'+
      '<div class="card-meta">'+
      '<span class="tag '+(a.tagClass||'tag-custom')+'">'+escHtml(a.tag||'')+'</span>'+
      '</div>'+
      '<div class="card-title">'+escHtml(a.title)+'</div>'+
      '<div class="card-summary">'+escHtml(a.summary||'')+'</div>'+
      '</div>'+
      '<div class="card-actions" onclick="event.stopPropagation()">'+
      (a.link?'<a class="btn-action btn-src" href="'+escAttr(a.link)+'" target="_blank" rel="noopener">↗</a>':'')+
      '<button class="btn-action '+(pinned?'active-save':'')+'" title="ピン留め" onclick="togglePin(\''+escAttr(a.title)+'\')">📌</button>'+
      '<button class="btn-action active-save" title="保存解除" onclick="removeSave(\''+escAttr(a.title)+'\')">🔖</button>'+
      '</div>'+
      '</div>';
  });
  html+='</div>';
  return html;
}

function togglePin(title){
  var bm=prefs.bookmarks||[];
  var b=bm.find(function(x){return x.title===title;});
  if(b){ b.pinned=!b.pinned; savePrefs(); renderBookmarks(); }
}

function removeSave(title){
  prefs.bookmarks=(prefs.bookmarks||[]).filter(function(b){return b.title!==title;});
  savePrefs(); renderBookmarks();
  showToast('🔖 保存を解除しました');
}

// ===== SETTINGS =====
function openSettings(){
  document.getElementById('apiKeyInput').value=getKey();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('open'); }
function saveKey(){
  var k=document.getElementById('apiKeyInput').value.trim();
  setKey(k); closeSettings(); showToast('✓ APIキーを保存しました');
}
function switchSettingsTab(idx,el){
  document.querySelectorAll('.modal-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.querySelectorAll('.modal-section').forEach(function(s){s.classList.remove('active');});
  document.getElementById('stab'+idx).classList.add('active');
}

// ===== CAT MODAL =====
function openCatModal(){
  renderCatList();
  // 既存カテゴリのセレクトボックスを更新
  var sel = document.getElementById('addFeedCatId');
  if(sel){
    sel.innerHTML = Object.keys(CATS).map(function(id){
      return '<option value="'+escAttr(id)+'">'+escHtml(CATS[id].icon+' '+CATS[id].label)+'</option>';
    }).join('');
  }
  document.getElementById('catModal').classList.add('open');
}
function closeCatModal(){ document.getElementById('catModal').classList.remove('open'); }

function renderCatList(){
  var html='';
  Object.keys(CATS).forEach(function(id){
    var cat=CATS[id];
    var type=cat.useSearch?(cat.feeds&&cat.feeds.length?'RSS+Search':'Search'):'RSS';
    html+='<div class="cat-item" style="flex-direction:column;align-items:flex-start;gap:6px">'+
      '<div style="display:flex;align-items:center;gap:8px;width:100%">'+
      '<span class="cat-item-icon">'+cat.icon+'</span>'+
      '<span class="cat-item-label">'+escHtml(cat.label)+'</span>'+
      '<span class="cat-item-type">'+type+'</span>'+
      (!cat.fixed?'<button class="btn-cat-del" style="margin-left:auto" onclick="delCat(\''+id+'\')">削除</button>':'')+
      '</div>'+
      ((cat.feeds&&cat.feeds.length)?
        '<div style="padding-left:24px;width:100%;display:flex;flex-direction:column;gap:4px">'+
        cat.feeds.map(function(f,fi){
          return '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="flex:1;font-size:0.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(f)+'</span>'+
            '<button class="btn-cat-del" onclick="delFeed(\''+escAttr(id)+'\','+fi+')">✕</button>'+
            '</div>';
        }).join('')+
        '</div>'
      :'')+
      '</div>';
  });
  document.getElementById('catList').innerHTML=html||'<div style="color:var(--muted);font-size:0.8rem">カテゴリがありません</div>';
}

function delFeed(catId, idx){
  var cat=CATS[catId]; if(!cat||!cat.feeds) return;
  cat.feeds.splice(idx,1);
  saveCats();
  renderCatList();
  showToast('✓ RSSを削除しました');
}

function addFeedToCat(){
  var catId = document.getElementById('addFeedCatId').value;
  var url = document.getElementById('addFeedUrl').value.trim();
  if(!catId || !url){ showToast('カテゴリとURLを入力してください'); return; }
  var cat = CATS[catId]; if(!cat) return;
  if(!cat.feeds) cat.feeds = [];
  if(cat.feeds.includes(url)){ showToast('このURLは既に登録されています'); return; }
  cat.feeds.push(url);
  // useSearchは維持（RSS取得失敗時のフォールバックとして使用）
  saveCats();
  document.getElementById('addFeedUrl').value = '';
  buildTabs(); buildSections();
  showToast('✓ RSSを追加しました');
}

function addCat(){
  var label=document.getElementById('newCatLabel').value.trim();
  var icon=document.getElementById('newCatIcon').value.trim()||'📰';
  var rss=document.getElementById('newCatRss').value.trim();
  if(!label){ showToast('ラベル名を入力してください'); return; }
  var id='cat_'+Date.now();
  var cat={label:label,icon:icon,tagClass:'tag-custom'};
  if(rss) cat.feeds=[rss]; else cat.useSearch=true; cat.searchQuery=label+' 最新ニュース';
  CATS[id]=cat; saveCats();
  document.getElementById('newCatLabel').value='';
  document.getElementById('newCatIcon').value='';
  document.getElementById('newCatRss').value='';
  buildTabs(); buildSections();
  renderCatList();
  showToast('✓ カテゴリを追加しました');
}

function delCat(id){
  if(!confirm('「'+CATS[id].label+'」を削除しますか？')) return;
  delete CATS[id]; delete cache[id]; saveCats(); saveCache();
  buildTabs(); buildSections();
  renderCatList();
  switchTab('hot');
  showToast('✓ カテゴリを削除しました');
}

// ===== CLOCK & SCHEDULE =====
function updateClock(){
  var now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('ja-JP');
  updateSlots(now);
  checkAutoFetch(now);
}

function updateSlots(now){
  var slotsEl=document.getElementById('slots');
  var h=now.getHours(), m=now.getMinutes();
  var cur=h*60+m;
  var html='';
  SCHEDULE.forEach(function(s){
    var parts=s.split(':');
    var sm=parseInt(parts[0])*60+parseInt(parts[1]);
    var active=Math.abs(cur-sm)<5;
    html+='<div class="slot'+(active?' active':'')+'"><div class="slot-dot"></div>'+s+'</div>';
  });
  slotsEl.innerHTML=html;
}

function checkAutoFetch(now){
  var h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
  if(s!==0) return;
  var t=h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');
  if(SCHEDULE.includes(t) && !lastAutoFetch[t]){
    lastAutoFetch[t]=true;
    setTimeout(function(){delete lastAutoFetch[t];},60000);
    fetchAll().then(function(){
      if(Notification.permission==='granted'){
        var n=new Notification('DIGEST 更新完了',{body:'新しい記事があります',icon:'',tag:'digest-update'});
        n.onclick=function(){window.focus();n.close();};
      }
    });
  }
}

// ===== NOTIFICATION =====
function requestNotification(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// ===== TOAST =====
function showToast(msg,duration){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},duration||2500);
}

// ===== UTILS =====
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// トレイリングカンマを除去してJSONパース
function parseJson(str){
  var clean = str.replace(/,\s*([}\]])/g,'$1');
  try{ return JSON.parse(clean); }catch(e){
    var s=clean.indexOf('['),en=clean.lastIndexOf(']');
    if(s!==-1&&en!==-1&&en>s){ try{ return JSON.parse(clean.slice(s,en+1)); }catch(e2){} }
    var s2=clean.indexOf('{'),en2=clean.lastIndexOf('}');
    if(s2!==-1&&en2!==-1&&en2>s2){ try{ return JSON.parse('['+clean.slice(s2,en2+1)+']'); }catch(e3){} }
    throw new Error('JSONパース失敗: '+e.message);
  }
}

// ===== INIT =====
function init(){
  loadAll();
  buildUI();
  setInterval(updateClock,1000);
  updateClock();
  requestNotification();
  if(!getKey()) setTimeout(openSettings,500);
}

document.addEventListener('DOMContentLoaded',init);
</script>
